workflows:
  tiraath-tweak:
    name: TiraathIP Tweak Build
    max_build_duration: 30
    environment:
      vars:
        THEOS: /opt/theos

    scripts:
      - name: Install Dependencies
        script: |
          brew install ldid dpkg xz

      - name: Install Theos
        script: |
          if [ ! -d "$THEOS" ]; then
            sudo mkdir -p $THEOS
            sudo chown $(whoami) $THEOS
            git clone --recursive https://github.com/theos/theos.git $THEOS
          fi

      - name: Link iOS SDK from Xcode
        script: |
          mkdir -p $THEOS/sdks
          SDKPATH=$(xcrun --sdk iphoneos --show-sdk-path)
          SDKNAME=$(basename "$SDKPATH")
          if [ ! -e "$THEOS/sdks/$SDKNAME" ]; then
            ln -sf "$SDKPATH" "$THEOS/sdks/$SDKNAME"
          fi
          echo "Using SDK: $SDKNAME"

      - name: Build Tweak
        script: |
          make clean
          make

    artifacts:
      - .theos/obj/debug/*.dylib
